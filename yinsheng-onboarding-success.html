<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>银盛钱包 · 入驻成功</title>
  <style>
    :root{
      --primary:#165DFF;--primary-light:#4080FF;--primary-bg:#EEF3FF;--primary-pale:#D6E4FF;
      --success:#00B42A;--success-bg:#E8FFEA;--success-dark:#009A24;
      --text-1:#1D2129;--text-2:#4E5969;--text-3:#86909C;--text-dis:#C9CDD4;
      --border:#E5E6EB;--bg:#F2F3F5;--card:#FFFFFF;
      --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:24px;--r-full:9999px;
      --shadow-card:0 4px 20px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
      --tr:200ms cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
      background:linear-gradient(160deg,#E8FFEA 0%,#F0FFF4 40%,#F2F3F5 100%);
      min-height:100vh;-webkit-font-smoothing:antialiased;
      display:flex;flex-direction:column;align-items:center;
      padding:0 16px 40px;outline:none;border:none;}

    /* 彩带粒子 */
    .confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
    .confetti-piece{position:absolute;width:8px;height:8px;opacity:0;animation:fall linear infinite;}
    @keyframes fall{
      0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
      100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
    }

    .page-wrap{position:relative;z-index:1;width:100%;max-width:420px;
      display:flex;flex-direction:column;align-items:center;padding-top:48px;}

    /* 成功图标 - 统一呼吸动画 */
    .success-stage{position:relative;width:120px;height:120px;margin-bottom:28px;}
    .success-pulse{position:absolute;inset:0;border-radius:50%;
      border:2px solid rgba(0,180,42,0.25);
      animation:pulse-out 2.4s ease-out infinite;}
    .success-pulse:nth-child(2){animation-delay:0.8s;}
    .success-pulse:nth-child(3){animation-delay:1.6s;}
    @keyframes pulse-out{
      0%{transform:scale(0.85);opacity:0.8;}
      100%{transform:scale(1.4);opacity:0;}
    }
    .success-circle{position:absolute;inset:10px;border-radius:50%;
      background:linear-gradient(135deg,#00B42A,#00D42A);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 8px 32px rgba(0,180,42,0.4);}
    .success-circle svg{animation:check-draw .6s ease-out .3s both;}
    @keyframes check-draw{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}

    /* 主文案 */
    .success-title{font-size:26px;font-weight:800;color:var(--text-1);
      letter-spacing:.5px;margin-bottom:8px;text-align:center;}
    .success-title em{color:var(--success);font-style:normal;}
    .success-sub{font-size:14px;color:var(--text-2);margin-bottom:32px;text-align:center;line-height:1.6;}

    /* 信息卡 */
    .info-card{width:100%;background:#fff;border-radius:var(--r-lg);
      box-shadow:var(--shadow-card);border:1px solid rgba(229,230,235,.6);
      margin-bottom:16px;overflow:hidden;}
    .info-card-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:8px;}
    .info-card-icon{width:30px;height:30px;border-radius:var(--r-sm);
      display:flex;align-items:center;justify-content:center;}
    .info-card-title{font-size:15px;font-weight:600;color:var(--text-1);}
    .info-rows{padding:4px 0;}
    .info-row{display:flex;align-items:center;justify-content:space-between;
      padding:12px 20px;border-bottom:1px solid var(--border);}
    .info-row:last-child{border-bottom:none;}
    .info-key{font-size:13px;color:var(--text-3);}
    .info-val{font-size:13px;font-weight:600;color:var(--text-1);
      display:flex;align-items:center;gap:6px;}
    .badge-success{background:var(--success-bg);color:var(--success);
      font-size:11px;padding:2px 8px;border-radius:var(--r-full);font-weight:600;}
    .badge-blue{background:var(--primary-bg);color:var(--primary);
      font-size:11px;padding:2px 8px;border-radius:var(--r-full);font-weight:600;}

    /* 步骤完成时间线 */
    .timeline-card{width:100%;background:#fff;border-radius:var(--r-lg);
      box-shadow:var(--shadow-card);border:1px solid rgba(229,230,235,.6);
      margin-bottom:16px;overflow:hidden;}
    .timeline-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:8px;}
    .timeline-body{padding:16px 20px;}
    .tl-item{display:flex;align-items:flex-start;gap:12px;position:relative;}
    .tl-item:not(:last-child){padding-bottom:16px;}
    .tl-item:not(:last-child)::after{content:'';position:absolute;left:13px;top:28px;
      bottom:0;width:2px;background:var(--border);}
    .tl-dot{width:28px;height:28px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      background:var(--success-bg);z-index:1;}
    .tl-content{flex:1;padding-top:2px;}
    .tl-name{font-size:13px;font-weight:600;color:var(--text-1);margin-bottom:2px;}
    .tl-time{font-size:12px;color:var(--text-3);}

    /* 按钮 */
    .btn-group{width:100%;display:flex;flex-direction:column;gap:12px;margin-top:4px;}
    .btn-primary{height:52px;border:none;border-radius:var(--r-full);
      background:linear-gradient(90deg,#165DFF,#4080FF);color:#fff;
      font-size:16px;font-weight:600;letter-spacing:.5px;cursor:pointer;font-family:inherit;
      box-shadow:0 4px 12px rgba(22,93,255,.30);transition:all var(--tr);}
    .btn-primary:hover{filter:brightness(1.05);}
    .btn-outline{height:48px;border:1.5px solid var(--border);border-radius:var(--r-full);
      background:transparent;color:var(--text-2);font-size:15px;font-weight:500;cursor:pointer;
      font-family:inherit;transition:all var(--tr);}
    .btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-bg);}
    .btn-text{height:48px;border:none;border-radius:var(--r-full);
      background:transparent;color:var(--text-3);font-size:14px;cursor:pointer;
      font-family:inherit;transition:all var(--tr);}
    .btn-text:hover{color:var(--text-2);}

    /* Toast */
    .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-20px);
      background:rgba(29,33,41,.88);color:#fff;font-size:14px;padding:10px 20px;
      border-radius:var(--r-full);backdrop-filter:blur(8px);opacity:0;
      transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<!-- 彩带效果 -->
<div class="confetti" id="confetti"></div>
<div class="toast" id="toast"></div>

<div class="page-wrap">

  <!-- 成功图标 -->
  <div class="success-stage">
    <div class="success-pulse"></div>
    <div class="success-pulse"></div>
    <div class="success-pulse"></div>
    <div class="success-circle">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <path d="M12 26l10 10 18-18" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- 标题 -->
  <div class="success-title">申请<em>成功</em> 🎉</div>
  <div class="success-sub">恭喜您，银盛支付已成功开通<br/>现在您可以开始收款和提现</div>

  <!-- 账户信息 -->
  <div class="info-card">
    <div class="info-card-header">
      <div class="info-card-icon" style="background:var(--primary-bg);">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="#165DFF" stroke-width="1.2"/>
          <path d="M1.5 7h13" stroke="#165DFF" stroke-width="1.2"/>
          <rect x="3" y="9.5" width="3.5" height="1.5" rx="0.5" fill="#165DFF"/>
        </svg>
      </div>
      <span class="info-card-title">账户信息</span>
    </div>
    <div class="info-rows">
      <div class="info-row">
        <span class="info-key">账户状态</span>
        <span class="info-val"><span class="badge-success">✓ 已认证</span></span>
      </div>
      <div class="info-row">
        <span class="info-key">实名姓名</span>
        <span class="info-val">张小明</span>
      </div>
      <div class="info-row">
        <span class="info-key">账户权限</span>
        <span class="info-val"><span class="badge-blue">收款</span><span class="badge-blue">提现</span></span>
      </div>
    </div>
  </div>

  <!-- 返回首页按钮 -->
  <div class="btn-group" style="padding: 0 16px; margin-top: 16px;">
    <button class="btn-text" onclick="goToHome()">← 返回流程总览</button>
  </div>

</div>

<script>
function showToast(msg,d=2200){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),d);
}

function goToHome(){
  window.location.href = 'yinsheng-prototype-index.html';
}

/* 彩带动画 */
const colors=['#165DFF','#4080FF','#00B42A','#FF7D00','#F53F3F','#B5E8FF','#B7F5C2','#FFD7A8'];
const confetti=document.getElementById('confetti');
for(let i=0;i<28;i++){
  const el=document.createElement('div');
  el.className='confetti-piece';
  const s=Math.random()*6+4;
  el.style.cssText=`
    width:${s}px;height:${s*1.5}px;
    left:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    border-radius:${Math.random()>0.5?'50%':'2px'};
    animation-duration:${Math.random()*3+2}s;
    animation-delay:${Math.random()*2}s;
    opacity:0;
  `;
  confetti.appendChild(el);
}
</script>
</body>
</html>
