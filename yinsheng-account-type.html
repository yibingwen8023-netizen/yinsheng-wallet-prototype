<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>银盛钱包 · 选择账户类型</title>
  <style>
    :root {
      --primary:#165DFF; --primary-light:#4080FF; --primary-bg:#EEF3FF; --primary-pale:#D6E4FF;
      --success:#00B42A; --success-bg:#E8FFEA;
      --text-1:#1D2129; --text-2:#4E5969; --text-3:#86909C; --text-dis:#C9CDD4;
      --border:#E5E6EB; --bg:#F2F3F5; --card:#FFFFFF;
      --r-sm:6px; --r-md:10px; --r-lg:16px;
      --shadow-card:0 4px 20px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
      --tr:200ms cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
      background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;}

    /* Logo区域 */
    .header{padding:40px 20px 30px;text-align:center;}
    .logo{font-size:32px;font-weight:700;color:var(--text-1);letter-spacing:2px;}

    /* 主标题 */
    .title-section{text-align:center;padding:20px 20px 40px;}
    .title{font-size:22px;font-weight:600;color:var(--text-1);margin-bottom:8px;}
    .subtitle{font-size:14px;color:var(--text-3);}

    /* 卡片容器 */
    .cards-container{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      max-width:520px;
      margin:0 auto;
      padding:0 20px;
    }

    /* 选择卡片 */
    .type-card{
      background:#fff;
      border-radius:var(--r-lg);
      padding:28px 20px;
      text-align:center;
      cursor:pointer;
      transition:all var(--tr);
      border:2px solid transparent;
      box-shadow:var(--shadow-card);
    }
    .type-card:hover{border-color:var(--primary-pale);transform:translateY(-2px);}
    .type-card.selected{border-color:var(--primary);background:var(--primary-bg);}

    .card-icon{
      width:64px;height:64px;
      margin:0 auto 16px;
      background:var(--primary-bg);
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:32px;
    }
    .type-card.selected .card-icon{background:var(--primary);}

    .card-title{font-size:17px;font-weight:600;color:var(--text-1);margin-bottom:8px;}
    .card-desc{font-size:13px;color:var(--text-3);margin-bottom:12px;line-height:1.5;}
    .card-tag{
      display:inline-block;
      background:var(--primary-bg);
      color:var(--primary);
      font-size:12px;
      padding:4px 12px;
      border-radius:var(--r-full);
    }
    .type-card.selected .card-tag{
      background:var(--primary);
      color:#fff;
    }

    /* 底部按钮 */
    .bottom-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:#fff;padding:12px 20px 32px;
      display:flex;flex-direction:column;gap:12px;
      border-top:1px solid var(--border);
    }
    .btn-primary{
      height:48px;border:none;border-radius:var(--r-sm);
      background:var(--primary);color:#fff;
      font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;
      transition:all var(--tr);width:100%;
    }
    .btn-primary:hover:not(:disabled){filter:brightness(1.05);}
    .btn-primary:active:not(:disabled){transform:scale(0.98);}
    .btn-primary:disabled{background:#C9CDD4;cursor:not-allowed;}
    .bottom-tech{font-size:12px;color:#C9CDD4;text-align:center;}

    /* Toast */
    .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-20px);
      background:rgba(29,33,41,.88);color:#fff;font-size:14px;padding:10px 20px;
      border-radius:var(--r-full);backdrop-filter:blur(8px);opacity:0;
      transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* 占位 */
    .spacer{height:120px;}

    @media(max-width:380px){
      .cards-container{gap:12px;}
      .card-icon{width:56px;height:56px;font-size:28px;}
      .card-title{font-size:15px;}
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Logo -->
<div class="header">
  <div class="logo">银盛钱包</div>
</div>

<!-- 标题 -->
<div class="title-section">
  <div class="title">请选择您要入驻的账户类型</div>
  <div class="subtitle">选择后进入对应的入驻流程</div>
</div>

<!-- 选择卡片 -->
<div class="cards-container">
  <!-- 个人账户 -->
  <div class="type-card selected" id="personalCard" onclick="selectType('personal')">
    <div class="card-icon">👤</div>
    <div class="card-title">个人账户入驻</div>
    <div class="card-desc">适合个人用户<br/>便捷快速入驻</div>
    <div class="card-tag">6步入驻</div>
  </div>

  <!-- 商户账户 -->
  <div class="type-card" id="merchantCard" onclick="selectType('merchant')">
    <div class="card-icon">🏢</div>
    <div class="card-title">商户账户入驻</div>
    <div class="card-desc">适合企业/商户<br/>认证更全面</div>
    <div class="card-tag">5步入驻</div>
  </div>
</div>

<div class="spacer"></div>

<!-- 底部按钮 -->
<div class="bottom-bar">
  <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">个人入驻</button>
  <div class="bottom-tech">由银盛提供技术支持</div>
</div>

<script>
  let selectedType = 'personal';

  function showToast(msg, d = 2000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), d);
  }

  function selectType(type) {
    selectedType = type;
    document.getElementById('personalCard').classList.toggle('selected', type === 'personal');
    document.getElementById('merchantCard').classList.toggle('selected', type === 'merchant');
    document.getElementById('submitBtn').textContent = type === 'personal' ? '个人入驻' : '商户入驻';
  }

  function handleSubmit() {
    // 存储账户类型，供后续页面使用
    sessionStorage.setItem('accountType', selectedType);
    
    if (selectedType === 'personal') {
      // 跳转个人入驻流程（填写资料页）
      window.location.href = 'yinsheng-onboarding-apply.html';
    } else {
      // 跳转商户入驻流程（填写信息页）
      window.location.href = 'yinsheng-merchant-apply.html';
    }
  }
</script>
</body>
</html>
