<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>银盛钱包 · 入驻申请</title>
  <style>
    :root {
      --primary:#165DFF; --primary-light:#4080FF; --primary-bg:#EEF3FF; --primary-pale:#D6E4FF;
      --success:#00B42A; --success-bg:#E8FFEA;
      --error:#F53F3F; --error-bg:#FFECE8;
      --text-1:#1D2129; --text-2:#4E5969; --text-3:#86909C; --text-dis:#C9CDD4;
      --border:#E5E6EB; --bg:#F2F3F5; --card:#FFFFFF;
      --r-sm:6px; --r-md:10px; --r-lg:16px; --r-full:9999px;
      --shadow-card:0 4px 20px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
      --tr:200ms cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
      background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;
      padding-bottom:100px;}

    /* 步骤条 */
    .step-bar{background:#fff;padding:20px 16px 16px;border-bottom:1px solid var(--border);}
    .step-list{display:flex;align-items:flex-start;justify-content:space-between;position:relative;}
    .step-list::before{content:'';position:absolute;top:14px;left:28px;right:28px;height:2px;background:#E5E6EB;z-index:0;}
    .step-item{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1;flex:1;}
    .step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:600;background:#E5E6EB;color:#86909C;transition:all var(--tr);}
    .step-item.active .step-num{background:var(--primary);color:#fff;}
    .step-item.done .step-num{background:var(--primary);color:#fff;}
    .step-num svg{display:none;}
    .step-item.done .step-num span{display:none;}
    .step-item.done .step-num svg{display:block;}
    .step-name{font-size:12px;color:#86909C;white-space:nowrap;}
    .step-item.active .step-name{color:var(--primary);font-weight:500;}
    .step-item.done .step-name{color:var(--text-1);}

    /* 内容 */
    .page-content{max-width:480px;margin:0 auto;padding:16px 16px 0;}

    /* 身份证上传区 */
    .id-section{margin-bottom:20px;}
    .id-section-title{font-size:14px;color:var(--text-1);margin-bottom:10px;display:flex;align-items:center;gap:2px;}
    .id-upload-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .upload-card{border:1.5px dashed #C9CDD4;border-radius:var(--r-md);background:#FAFBFC;
      cursor:pointer;transition:all var(--tr);aspect-ratio:1.6;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;}
    .upload-card:hover{border-color:var(--primary);background:var(--primary-bg);}
    .upload-card-inner{display:flex;flex-direction:column;align-items:center;gap:6px;}
    .upload-card .upload-icon{width:40px;height:40px;background:#E5E6EB;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:18px;}
    .upload-card .upload-text{font-size:13px;color:var(--text-3);}

    /* 表单字段 */
    .form-section{background:#fff;border-radius:var(--r-lg);padding:16px 20px;margin-bottom:16px;}
    .field-group{margin-bottom:16px;}
    .field-group:last-child{margin-bottom:0;}
    .field-label{font-size:14px;color:var(--text-1);margin-bottom:8px;display:flex;align-items:center;gap:2px;}
    .required{color:var(--error);}
    .input-wrap{border:1px solid #E5E6EB;border-radius:var(--r-sm);
      background:#fff;height:44px;display:flex;align-items:center;overflow:hidden;
      transition:border-color var(--tr);}
    .input-wrap:focus-within{border-color:var(--primary);}
    input.field-input{flex:1;height:100%;border:none;outline:none;background:transparent;
      font-size:15px;color:var(--text-1);padding:0 12px;font-family:inherit;}
    input.field-input::placeholder{color:#C9CDD4;}

    /* 安全提示条 */
    .security-banner{background:linear-gradient(90deg,#EEF3FF,#F0F9FF);
      border:1px solid var(--primary-pale);border-radius:var(--r-md);
      padding:10px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;}
    .security-banner svg{flex-shrink:0;margin-top:1px;}
    .security-banner-text{font-size:12px;color:var(--text-2);line-height:1.5;}
    .security-banner-text strong{color:var(--primary);}

    /* 底部按钮 */
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;
      background:#fff;padding:12px 20px 24px;
      display:flex;flex-direction:column;gap:10px;z-index:50;}
    .btn-primary{height:48px;border:none;border-radius:var(--r-sm);
      background:var(--primary);color:#fff;
      font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;
      transition:all var(--tr);}
    .btn-primary:hover:not(:disabled){filter:brightness(1.05);}
    .btn-primary:active:not(:disabled){transform:scale(0.98);}
    .btn-primary:disabled{background:#C9CDD4;cursor:not-allowed;}
    .bottom-tech{font-size:12px;color:#C9CDD4;text-align:center;margin-top:4px;}

    /* Toast */
    .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-20px);
      background:rgba(29,33,41,.88);color:#fff;font-size:14px;padding:10px 20px;
      border-radius:var(--r-full);backdrop-filter:blur(8px);opacity:0;
      transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:380px){.section-body{padding:14px 16px;}}
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- 步骤条 -->
<div class="step-bar">
  <div class="step-list">
    <div class="step-item active">
      <div class="step-num"><span>1</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">填写资料</div>
    </div>
    <div class="step-item">
      <div class="step-num"><span>2</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">银盛审核</div>
    </div>
    <div class="step-item">
      <div class="step-num"><span>3</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">签约确认</div>
    </div>
    <div class="step-item">
      <div class="step-num"><span>4</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">绑定银行卡</div>
    </div>
    <div class="step-item">
      <div class="step-num"><span>5</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">设置密码</div>
    </div>
    <div class="step-item">
      <div class="step-num"><span>6</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">申请成功</div>
    </div>
  </div>
</div>

<div class="page-content">



  <!-- 身份证上传 -->
  <div class="id-section">
    <div class="id-section-title"><span class="required">*</span>身份证正面与反面</div>
    <div class="id-upload-row">
      <!-- 正面 -->
      <div class="upload-card" id="frontBox" onclick="toggleUpload('front')">
        <div class="upload-card-inner">
          <div class="upload-icon">📷</div>
          <div class="upload-text">点击上传</div>
        </div>
      </div>
      <!-- 反面 -->
      <div class="upload-card" id="backBox" onclick="toggleUpload('back')">
        <div class="upload-card-inner">
          <div class="upload-icon">📷</div>
          <div class="upload-text">点击上传</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 基本信息 -->
  <div class="form-section">
    <div class="field-group">
      <div class="field-label"><span class="required">*</span>姓名</div>
      <div class="input-wrap">
        <input class="field-input" type="text" placeholder="请输入真实姓名" maxlength="20" id="realName"/>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label"><span class="required">*</span>证件号码</div>
      <div class="input-wrap">
        <input class="field-input" type="text" placeholder="请输入身份证号" maxlength="18" id="idCard"/>
      </div>
    </div>
    <div class="field-group" style="margin-bottom:0">
      <div class="field-label"><span class="required">*</span>银行卡号</div>
      <div class="input-wrap">
        <input class="field-input" type="tel" placeholder="请输入银行卡号" maxlength="23" id="bankCard" oninput="onBankCardInput(this)"/>
      </div>
      <div class="code-hint" id="bankHint" style="display:none;font-size:12px;color:#00B42A;margin-top:6px;">✓ 银行卡验证通过</div>
    </div>
  </div>

  <!-- 占位，防止内容被底部遮盖 -->
  <div style="height:16px;"></div>
</div>

<!-- 底部按钮 -->
<div class="bottom-bar">
  <button class="btn-primary" onclick="handleSubmit()">确定提交</button>
  <div class="bottom-tech">由银盛提供技术支持</div>
</div>

<script>
  function showToast(msg,d=2200){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),d);
  }
  function toggleUpload(side){
    showToast(`点击重新上传身份证${side==='front'?'正面':'反面'}`);
  }
  
  // 银行卡号格式化
  function onBankCardInput(el){
    el.value = el.value.replace(/\D/g, '').slice(0, 19).replace(/(\d{4})(?=\d)/g, '$1 ');
    const hint = document.getElementById('bankHint');
    if(el.value.replace(/\s/g, '').length >= 16){
      hint.style.display = 'block';
    } else {
      hint.style.display = 'none';
    }
  }
  
  function handleSubmit(){
    const name = document.getElementById('realName').value.trim();
    const idCard = document.getElementById('idCard').value.trim();
    const bankCard = document.getElementById('bankCard').value.replace(/\s/g, '');
    
    if(!name){
      showToast('请输入真实姓名');
      return;
    }
    if(!idCard || idCard.length !== 18){
      showToast('请输入正确的18位身份证号');
      return;
    }
    if(!bankCard || bankCard.length < 16){
      showToast('请输入正确的银行卡号');
      return;
    }
    
    showToast('⏳ 正在提交申请…');
    setTimeout(()=>{
      window.location.href='yinsheng-signing-processing.html';
    },1200);
  }
</script>
</body>
</html>
