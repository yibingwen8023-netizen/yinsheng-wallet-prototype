<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>申请银盛收款账户 · 登录</title>
  <style>
    /* ===== 设计令牌 ===== */
    :root {
      --color-primary:       #165DFF;
      --color-primary-light: #4080FF;
      --color-primary-bg:    #EEF3FF;
      --color-primary-dark:  #0E3EB5;

      --color-success:  #00B42A;
      --color-error:    #F53F3F;
      --color-warning:  #FF7D00;

      --color-text-primary:   #1D2129;
      --color-text-secondary: #4E5969;
      --color-text-placeholder: #86909C;
      --color-text-disabled:  #C9CDD4;

      --color-border:       #E5E6EB;
      --color-border-focus: #165DFF;
      --color-bg:           #F2F3F5;
      --color-card:         #FFFFFF;

      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  16px;
      --radius-xl:  24px;
      --radius-full: 9999px;

      --shadow-card: 0 4px 20px 0 rgba(0, 0, 0, 0.08), 0 1px 4px 0 rgba(0, 0, 0, 0.04);
      --shadow-btn:  0 4px 12px 0 rgba(22, 93, 255, 0.30);

      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(160deg, #EEF3FF 0%, #F2F3F5 50%, #FFFFFF 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 背景装饰 ===== */
    .bg-decor {
      position: fixed;
      top: -80px;
      left: -80px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22,93,255,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .bg-decor-2 {
      position: fixed;
      bottom: -60px;
      right: -60px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22,93,255,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== 包裹容器 ===== */
    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ===== Logo 区域 ===== */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .brand-logo {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, #165DFF 0%, #4080FF 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(22, 93, 255, 0.35);
      position: relative;
      overflow: hidden;
    }
    .brand-logo::before {
      content: '';
      position: absolute;
      top: -12px;
      right: -12px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }
    .brand-logo svg {
      width: 40px;
      height: 40px;
      position: relative;
      z-index: 1;
    }
    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: 2px;
      text-align: center;
    }
    .brand-tagline {
      font-size: 13px;
      color: var(--color-text-secondary);
      letter-spacing: 1px;
      margin-top: 4px;
      text-align: center;
    }

    /* ===== 登录卡片 ===== */
    .login-card {
      width: 100%;
      background: var(--color-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 32px 28px 28px;
      border: 1px solid rgba(229, 230, 235, 0.6);
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 28px;
    }

    /* ===== 表单 ===== */
    .form { display: flex; flex-direction: column; gap: 16px; }

    /* 字段组 */
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    /* 输入行 */
    .input-row {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      background: #FAFBFC;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      overflow: hidden;
      height: 52px;
    }
    .input-row:focus-within {
      border-color: var(--color-border-focus);
      background: #FFFFFF;
      box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.10);
    }
    .input-row.has-error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(245, 63, 63, 0.10);
    }
    .input-row.has-success {
      border-color: var(--color-success);
    }

    /* 输入框主体 */
    .input-field {
      flex: 1;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 15px;
      color: var(--color-text-primary);
      padding: 0 12px;
      font-family: inherit;
      letter-spacing: 0.3px;
    }
    .input-field::placeholder { color: var(--color-text-placeholder); }

    /* 清除图标 */
    .btn-clear {
      display: none;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      margin-right: 6px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--color-text-placeholder);
      transition: background var(--transition), color var(--transition);
      flex-shrink: 0;
    }
    .btn-clear:hover {
      background: var(--color-bg);
      color: var(--color-text-secondary);
    }
    .btn-clear.visible { display: flex; }

    /* 获取验证码按钮 */
    .btn-sms {
      flex-shrink: 0;
      height: 100%;
      padding: 0 16px;
      border: none;
      border-left: 1.5px solid var(--color-border);
      background: transparent;
      color: var(--color-primary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background var(--transition), color var(--transition);
    }
    .btn-sms:hover:not(:disabled) { background: var(--color-primary-bg); }
    .btn-sms:disabled {
      color: var(--color-text-disabled);
      cursor: not-allowed;
      background: transparent;
    }
    .btn-sms.counting { color: var(--color-text-placeholder); font-weight: 400; }

    /* 错误提示 */
    .field-error {
      font-size: 12px;
      color: var(--color-error);
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 16px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity var(--transition), transform var(--transition);
    }
    .field-error.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== 分隔线 ===== */
    .divider {
      height: 1px;
      background: var(--color-border);
      margin: 4px 0 8px;
    }

    /* ===== 登录按钮 ===== */
    .btn-login {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: var(--radius-full);
      background: linear-gradient(90deg, #165DFF 0%, #4080FF 100%);
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--transition);
      box-shadow: var(--shadow-btn);
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background var(--transition);
    }
    .btn-login:hover:not(:disabled)::after { background: rgba(255,255,255,0.08); }
    .btn-login:active:not(:disabled) { transform: scale(0.98); box-shadow: 0 2px 8px rgba(22,93,255,0.25); }
    .btn-login:disabled {
      background: #C9CDD4;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* 按钮内 loading 动画 */
    .btn-login .btn-text { position: relative; z-index: 1; }
    .btn-login.loading .btn-text::after {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.5);
      border-top-color: #FFFFFF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: -3px;
      margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 底部安全提示 ===== */
    .security-tip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: var(--color-text-placeholder);
      margin-top: -8px;
    }
    .security-tip svg { flex-shrink: 0; }

    /* ===== 底部版权 ===== */
    .footer {
      font-size: 12px;
      color: var(--color-text-disabled);
      text-align: center;
      line-height: 1.6;
    }

    /* ===== Toast 提示 ===== */
    .toast {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(29, 33, 41, 0.88);
      color: #FFFFFF;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== 验证码格子输入（可选动效） ===== */
    .code-hint {
      font-size: 12px;
      color: var(--color-text-placeholder);
      text-align: right;
      margin-top: -2px;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 400px) {
      .login-card { padding: 24px 20px 22px; }
      .btn-sms { padding: 0 12px; font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- 背景装饰 -->
<div class="bg-decor"></div>
<div class="bg-decor-2"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 主体 -->
<div class="page-wrapper">

  <!-- Logo & 品牌 -->
  <div class="brand">
    <div class="brand-logo">
      <!-- 钱包 SVG Logo -->
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="12" width="30" height="20" rx="4" fill="white" fill-opacity="0.25" stroke="white" stroke-width="2"/>
        <path d="M4 17h30" stroke="white" stroke-width="2"/>
        <rect x="24" y="21" width="8" height="6" rx="2" fill="white"/>
        <circle cx="27" cy="24" r="1.2" fill="#165DFF"/>
        <path d="M10 8h14a4 4 0 0 1 4 4H6a4 4 0 0 1 4-4z" fill="white" fill-opacity="0.4"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">申请银盛收款账户</div>
      <div class="brand-tagline">安全 · 便捷 · 智能支付</div>
    </div>
  </div>

  <!-- 登录卡片 -->
  <div class="login-card">
    <div class="card-title">手机号登录</div>
    <div class="card-subtitle">未注册的手机号验证后将自动创建账户</div>

    <form class="form" id="loginForm" onsubmit="return false;">

      <!-- 手机号 -->
      <div class="field-group">
        <label class="field-label">手机号码</label>
        <div class="input-row" id="phoneRow">
          <input
            type="tel"
            class="input-field"
            id="phoneInput"
            placeholder="请输入手机号码"
            maxlength="11"
            inputmode="numeric"
            autocomplete="tel"
          />
          <button type="button" class="btn-clear" id="phoneClear" aria-label="清除手机号">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" fill="#C9CDD4"/>
              <path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="field-error" id="phoneError">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="5.5" stroke="#F53F3F"/>
            <path d="M6 3.5v3M6 8.5h.01" stroke="#F53F3F" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span id="phoneErrorText"></span>
        </div>
      </div>

      <!-- 验证码 -->
      <div class="field-group">
        <label class="field-label">短信验证码</label>
        <div class="input-row" id="codeRow">
          <input
            type="text"
            class="input-field"
            id="codeInput"
            placeholder="请输入6位验证码"
            maxlength="6"
            inputmode="numeric"
            autocomplete="one-time-code"
          />
          <button type="button" class="btn-sms" id="btnSms">获取验证码</button>
        </div>
        <div class="field-error" id="codeError">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="5.5" stroke="#F53F3F"/>
            <path d="M6 3.5v3M6 8.5h.01" stroke="#F53F3F" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span id="codeErrorText"></span>
        </div>
      </div>

      <!-- 登录按钮 -->
      <button type="submit" class="btn-login" id="btnLogin" disabled>
        <span class="btn-text">登录</span>
      </button>

    </form>
  </div>

  <!-- 安全提示 -->
  <div class="security-tip">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M6.5 1L2 3v3.5c0 2.76 1.93 5.34 4.5 6 2.57-.66 4.5-3.24 4.5-6V3L6.5 1z"
        stroke="#C9CDD4" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
      <path d="M4.5 6.5l1.5 1.5 2.5-2.5" stroke="#C9CDD4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    银行级 256 位加密保护 · 符合央行监管标准
  </div>

  <!-- 底部版权 -->
  <div class="footer">
    银盛支付服务股份有限公司<br/>
    © 2026 版权所有
  </div>

</div>

<script>
  /* ============================================================
     状态管理
  ============================================================ */
  const state = {
    phone: '',
    code: '',
    smsSent: false,
    countdown: 0,
    timer: null,
    loading: false,
  };

  /* ============================================================
     DOM 引用
  ============================================================ */
  const phoneInput   = document.getElementById('phoneInput');
  const phoneClear   = document.getElementById('phoneClear');
  const phoneRow     = document.getElementById('phoneRow');
  const phoneError   = document.getElementById('phoneError');
  const phoneErrTxt  = document.getElementById('phoneErrorText');

  const codeInput    = document.getElementById('codeInput');
  const codeRow      = document.getElementById('codeRow');
  const codeError    = document.getElementById('codeError');
  const codeErrTxt   = document.getElementById('codeErrorText');

  const btnSms       = document.getElementById('btnSms');
  const btnLogin     = document.getElementById('btnLogin');

  /* ============================================================
     工具函数
  ============================================================ */
  function isValidPhone(val) {
    return /^1[3-9]\d{9}$/.test(val.replace(/\s/g, ''));
  }

  function showToast(msg, duration = 2000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), duration);
  }

  function setPhoneError(msg) {
    if (msg) {
      phoneErrTxt.textContent = msg;
      phoneError.classList.add('visible');
      phoneRow.classList.add('has-error');
    } else {
      phoneError.classList.remove('visible');
      phoneRow.classList.remove('has-error');
    }
  }

  function setCodeError(msg) {
    if (msg) {
      codeErrTxt.textContent = msg;
      codeError.classList.add('visible');
      codeRow.classList.add('has-error');
    } else {
      codeError.classList.remove('visible');
      codeRow.classList.remove('has-error');
    }
  }

  /* ============================================================
     按钮状态更新
  ============================================================ */
  function updateBtnStates() {
    const phoneOk  = isValidPhone(state.phone);
    const codeOk   = state.code.length === 6;
    const counting = state.countdown > 0;

    // 获取验证码：需要手机号合法 + 不在倒计时
    btnSms.disabled = !phoneOk || counting;

    // 登录：需要手机号合法 + 验证码6位
    btnLogin.disabled = !phoneOk || !codeOk || state.loading;
  }

  /* ============================================================
     手机号输入
  ============================================================ */
  phoneInput.addEventListener('input', () => {
    // 只保留数字
    phoneInput.value = phoneInput.value.replace(/\D/g, '');
    state.phone = phoneInput.value;

    // 清除按钮显示
    phoneClear.classList.toggle('visible', state.phone.length > 0);

    // 实时校验（仅在输满 11 位或失焦后显示错误）
    if (state.phone.length === 11 && !isValidPhone(state.phone)) {
      setPhoneError('请输入正确的手机号码');
    } else {
      setPhoneError('');
    }

    // 自动触发：若验证码已6位，重新检查登录按钮
    updateBtnStates();
  });

  phoneInput.addEventListener('blur', () => {
    if (state.phone.length > 0 && !isValidPhone(state.phone)) {
      setPhoneError('请输入正确的11位手机号码');
    }
  });

  phoneInput.addEventListener('focus', () => {
    setPhoneError('');
  });

  phoneClear.addEventListener('click', () => {
    phoneInput.value = '';
    state.phone = '';
    phoneClear.classList.remove('visible');
    setPhoneError('');
    phoneInput.focus();
    updateBtnStates();
  });

  /* ============================================================
     验证码输入
  ============================================================ */
  codeInput.addEventListener('input', () => {
    codeInput.value = codeInput.value.replace(/\D/g, '');
    state.code = codeInput.value;
    setCodeError('');
    updateBtnStates();

    // 自动触发登录（6位后自动提交）
    if (state.code.length === 6 && isValidPhone(state.phone)) {
      triggerAutoLogin();
    }
  });

  codeInput.addEventListener('blur', () => {
    if (state.code.length > 0 && state.code.length < 6) {
      setCodeError('请输入完整的6位验证码');
    }
  });

  /* ============================================================
     获取验证码
  ============================================================ */
  btnSms.addEventListener('click', () => {
    if (!isValidPhone(state.phone)) {
      setPhoneError('请输入正确的手机号码');
      return;
    }

    // 开始倒计时
    startCountdown(60);
    showToast(`验证码已发送至 ${state.phone.slice(0,3)}****${state.phone.slice(7)}`);
    state.smsSent = true;
    codeInput.focus();
  });

  function startCountdown(seconds) {
    state.countdown = seconds;
    clearInterval(state.timer);
    btnSms.disabled = true;
    btnSms.classList.add('counting');

    state.timer = setInterval(() => {
      state.countdown--;
      if (state.countdown <= 0) {
        clearInterval(state.timer);
        state.countdown = 0;
        btnSms.textContent = '重新获取';
        btnSms.classList.remove('counting');
        updateBtnStates();
      } else {
        btnSms.textContent = `${state.countdown}s 后重发`;
      }
    }, 1000);

    btnSms.textContent = `${seconds}s 后重发`;
  }

  /* ============================================================
     自动触发登录
  ============================================================ */
  let autoLoginTimer = null;
  function triggerAutoLogin() {
    if (state.loading) return;
    clearTimeout(autoLoginTimer);
    autoLoginTimer = setTimeout(() => {
      if (state.code.length === 6 && isValidPhone(state.phone)) {
        handleLogin();
      }
    }, 400);
  }

  /* ============================================================
     登录处理
  ============================================================ */
  document.getElementById('loginForm').addEventListener('submit', handleLogin);
  btnLogin.addEventListener('click', handleLogin);

  function handleLogin(e) {
    if (e) e.preventDefault();
    if (state.loading) return;

    // 前端校验
    if (!isValidPhone(state.phone)) {
      setPhoneError('请输入正确的手机号码');
      return;
    }
    if (state.code.length !== 6) {
      setCodeError('请输入完整的6位验证码');
      return;
    }

    // 模拟登录请求
    state.loading = true;
    btnLogin.classList.add('loading');
    btnLogin.disabled = true;
    btnLogin.querySelector('.btn-text').textContent = '登录中';

    setTimeout(() => {
      // 模拟：验证码非 123456 则报错
      if (state.code !== '123456') {
        state.loading = false;
        btnLogin.classList.remove('loading');
        btnLogin.querySelector('.btn-text').textContent = '登录';
        setCodeError('验证码错误，请重新输入（演示请输入 123456）');
        codeInput.select();
        updateBtnStates();
        return;
      }

      // 成功
      btnLogin.querySelector('.btn-text').textContent = '✓ 登录成功';
      showToast('🎉 登录成功，正在跳转...', 3000);

      setTimeout(() => {
        // 跳转到账户类型选择页
        window.location.href = 'yinsheng-account-type.html';
      }, 1200);
    }, 1800);
  }

  /* ============================================================
