<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>银盛钱包 · 验证手机号</title>
  <style>
    :root{
      --primary:#165DFF;--primary-light:#4080FF;--primary-bg:#EEF3FF;--primary-pale:#D6E4FF;
      --success:#00B42A;--success-bg:#E8FFEA;
      --error:#F53F3F;--error-bg:#FFECE8;
      --text-1:#1D2129;--text-2:#4E5969;--text-3:#86909C;--text-dis:#C9CDD4;
      --border:#E5E6EB;--bg:#F2F3F5;--card:#FFFFFF;
      --r-sm:6px;--r-md:10px;--r-lg:16px;--r-full:9999px;
      --shadow-card:0 4px 20px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
      --tr:200ms cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
      background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:100px;}

    /* 步骤条 */
    .step-bar{background:#fff;padding:20px 16px 16px;border-bottom:1px solid var(--border);}
    .step-list{display:flex;align-items:flex-start;justify-content:space-between;position:relative;}
    .step-list::before{content:'';position:absolute;top:14px;left:28px;right:28px;height:2px;background:#E5E6EB;z-index:0;}
    .step-item{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1;flex:1;}
    .step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:600;background:#E5E6EB;color:#86909C;transition:all var(--tr);}
    .step-item.active .step-num{background:var(--primary);color:#fff;}
    .step-item.done .step-num{background:var(--primary);color:#fff;}
    .step-num svg{display:none;}
    .step-item.done .step-num span{display:none;}
    .step-item.done .step-num svg{display:block;}
    .step-name{font-size:12px;color:#86909C;white-space:nowrap;}
    .step-item.active .step-name{color:var(--primary);font-weight:500;}
    .step-item.done .step-name{color:var(--text-1);}

    .page-content{max-width:480px;margin:0 auto;padding:24px 16px 0;}

    /* 安全提示 */
    .security-tip{display:flex;align-items:flex-start;gap:8px;
      padding:12px 16px;background:linear-gradient(90deg,#EEF3FF,#F0F9FF);
      border:1px solid var(--primary-pale);border-radius:var(--r-md);margin-bottom:16px;}
    .security-tip svg{flex-shrink:0;margin-top:1px;}
    .security-tip-text{font-size:12px;color:var(--text-2);line-height:1.5;}
    .security-tip-text strong{color:var(--primary);}

    /* 手机号验证卡片 */
    .verify-card{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-card);
      border:1px solid rgba(229,230,235,.6);margin-bottom:16px;overflow:hidden;}
    .verify-card-header{padding:16px 20px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;}
    .verify-card-icon{width:36px;height:36px;border-radius:var(--r-sm);background:var(--primary-bg);
      display:flex;align-items:center;justify-content:center;}
    .verify-card-title{font-size:15px;font-weight:600;color:var(--text-1);}
    .verify-card-body{padding:20px;}
    
    /* 手机号显示 */
    .phone-display{display:flex;align-items:center;gap:12px;
      padding:14px 16px;background:#F7F8FA;border-radius:var(--r-md);margin-bottom:20px;}
    .phone-label{font-size:13px;color:var(--text-3);margin-bottom:4px;}
    .phone-number{font-size:16px;font-weight:600;color:var(--text-1);letter-spacing:1px;}

    /* 验证码输入 */
    .code-label{font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:8px;
      display:flex;align-items:center;gap:4px;}
    .code-required{color:var(--error);font-size:12px;}
    .code-input-row{border:1.5px solid var(--border);border-radius:var(--r-md);
      background:#FAFBFC;height:52px;display:flex;align-items:center;overflow:hidden;
      transition:border-color var(--tr),box-shadow var(--tr),background var(--tr);}
    .code-input-row:focus-within{border-color:var(--primary);background:#fff;
      box-shadow:0 0 0 3px rgba(22,93,255,.10);}
    .code-input-row.has-error{border-color:var(--error);box-shadow:0 0 0 3px rgba(245,63,63,.08);}
    input.code-input{flex:1;height:100%;border:none;outline:none;background:transparent;
      font-size:18px;color:var(--text-1);padding:0 16px;font-family:inherit;letter-spacing:4px;text-align:center;}
    input.code-input::placeholder{color:var(--text-3);font-size:14px;letter-spacing:0;}
    .btn-sms{flex-shrink:0;height:100%;padding:0 16px;border:none;
      border-left:1.5px solid var(--border);background:transparent;
      color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;
      white-space:nowrap;font-family:inherit;transition:background var(--tr);}
    .btn-sms:hover:not(:disabled){background:var(--primary-bg);}
    .btn-sms:disabled{color:var(--text-dis);cursor:not-allowed;}
    .code-error{font-size:12px;color:var(--error);margin-top:6px;
      display:flex;align-items:center;gap:4px;}
    .code-hint{font-size:12px;color:var(--text-3);margin-top:6px;}

    /* 底部按钮 */
    .bottom-bar{position:fixed;left:0;right:0;bottom:0;background:#fff;
      border-top:1px solid var(--border);padding:12px 16px 24px;z-index:100;}
    .btn-primary{width:100%;max-width:480px;margin:0 auto;display:block;
      height:48px;border:none;border-radius:var(--r-md);background:var(--primary);color:#fff;
      font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;
      transition:all var(--tr);}
    .btn-primary:hover:not(:disabled){background:var(--primary-light);transform:translateY(-1px);}
    .btn-primary:disabled{background:#C9CDD4;cursor:not-allowed;transform:none;}
    .btn-primary.loading{position:relative;color:transparent;pointer-events:none;}
    .btn-primary.loading::after{content:'';position:absolute;width:20px;height:20px;
      top:50%;left:50%;margin:-10px 0 0 -10px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Toast */
    .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);
      background:rgba(0,0,0,0.75);color:#fff;padding:12px 20px;border-radius:var(--r-md);
      font-size:14px;opacity:0;pointer-events:none;transition:all .2s;z-index:1000;}
    .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  </style>
</head>
<body>

<!-- 步骤条 -->
<div class="step-bar">
  <div class="step-list">
    <div class="step-item done">
      <div class="step-num"><span>1</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="step-name">填写资料</div>
    </div>
    <div class="step-item done">
      <div class="step-num"><span>2</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="step-name">银盛审核</div>
    </div>
    <div class="step-item done">
      <div class="step-num"><span>3</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="step-name">签约确认</div>
    </div>
    <div class="step-item done">
      <div class="step-num"><span>4</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="step-name">绑定银行卡</div>
    </div>
    <div class="step-item active">
      <div class="step-num"><span>5</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="step-name">设置密码</div>
    </div>
    <div class="step-item">
      <div class="step-num"><span>6</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="step-name">申请成功</div>
    </div>
  </div>
</div>

<div class="page-content">

  <!-- 安全提示 -->
  <div class="security-tip">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 1.5L2.5 4v4.5c0 2.5 1.75 4.8 4 5.5 2.25-.7 4-3 4-5.5V4L8 1.5z" fill="#EEF3FF" stroke="#165DFF" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M5.5 8l2 2 3-3" stroke="#165DFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="security-tip-text">
      为保障账户安全，请验证您的<strong>银行预留手机号</strong>，验证通过后方可设置支付密码
    </div>
  </div>

  <!-- 手机号验证卡片 -->
  <div class="verify-card">
    <div class="verify-card-header">
      <div class="verify-card-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="4" y="1" width="10" height="16" rx="2" stroke="#165DFF" stroke-width="1.2"/>
          <circle cx="9" cy="14" r="1" fill="#165DFF"/>
          <path d="M6 4h6" stroke="#165DFF" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="verify-card-title">验证手机号</span>
    </div>
    <div class="verify-card-body">
      <!-- 手机号显示 -->
      <div class="phone-display">
        <div>
          <div class="phone-label">验证手机号</div>
          <div class="phone-number" id="phoneNumber">138****8888</div>
        </div>
      </div>
      
      <!-- 验证码输入 -->
      <div class="code-label">短信验证码 <span class="code-required">*</span></div>
      <div class="code-input-row" id="codeRow">
        <input class="code-input" id="codeInput" type="tel"
          placeholder="请输入6位验证码" maxlength="6"
          oninput="onCodeInput(this)" autocomplete="one-time-code"/>
        <button class="btn-sms" id="btnSms" onclick="sendSms()">获取验证码</button>
      </div>
      <div class="code-error" id="codeError" style="display:none;">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <circle cx="6" cy="6" r="5.5" stroke="#F53F3F"/>
          <path d="M6 3.5v3M6 8.5h.01" stroke="#F53F3F" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span id="codeErrorText">验证码错误</span>
      </div>
      <div class="code-hint" id="codeHint" style="display:none;">
        验证码已发送至 138****8888
      </div>
    </div>
  </div>

  <div style="height:16px;"></div>
</div>

<!-- 底部按钮 -->
<div class="bottom-bar">
  <button class="btn-primary" id="btnSubmit" disabled onclick="handleSubmit()">
    提交验证
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
function showToast(msg,d=2200){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),d);
}

let countdown=0,smsTimer=null;
let codeVerified = false;

function onCodeInput(el){
  el.value=el.value.replace(/\D/g,'');
  document.getElementById('codeError').style.display='none';
  document.getElementById('codeRow').classList.remove('has-error');
  
  // 输入6位后启用提交按钮
  const btnSubmit = document.getElementById('btnSubmit');
  btnSubmit.disabled = el.value.length !== 6;
}

function sendSms(){
  if(countdown>0)return;
  countdown=60;
  document.getElementById('btnSms').disabled=true;
  document.getElementById('codeHint').style.display='block';
  smsTimer=setInterval(()=>{
    countdown--;
    document.getElementById('btnSms').textContent=countdown+'s';
    if(countdown<=0){clearInterval(smsTimer);countdown=0;
      document.getElementById('btnSms').textContent='重新获取';
      document.getElementById('btnSms').disabled=false;}
  },1000);
  document.getElementById('btnSms').textContent='60s';
  showToast('验证码已发送（演示码：123456）');
  document.getElementById('codeInput').focus();
}

function handleSubmit(){
  const code = document.getElementById('codeInput').value;
  const btn = document.getElementById('btnSubmit');
  
  if(code !== '123456'){
    document.getElementById('codeError').style.display='flex';
    document.getElementById('codeErrorText').textContent='验证码错误（演示请输入 123456）';
    document.getElementById('codeRow').classList.add('has-error');
    return;
  }
  
  // 验证成功
  btn.classList.add('loading');
  setTimeout(()=>{
    showToast('验证成功');
    setTimeout(()=>{
      window.location.href='yinsheng-set-password.html';
    },800);
  },1200);
}
</script>
</body>
</html>
