<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>银盛钱包 · 微信认证</title>
  <style>
    :root {
      --primary:#165DFF; --primary-light:#4080FF; --primary-bg:#EEF3FF; --primary-pale:#D6E4FF;
      --success:#00B42A; --success-bg:#E8FFEA;
      --text-1:#1D2129; --text-2:#4E5969; --text-3:#86909C; --text-dis:#C9CDD4;
      --border:#E5E6EB; --bg:#F2F3F5; --card:#FFFFFF;
      --r-sm:6px; --r-md:10px; --r-lg:16px; --r-full:9999px;
      --shadow-card:0 4px 20px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
      --tr:200ms cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
      background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:140px;}

    /* 顶部导航 */
    .nav-bar{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
    .nav-back{display:flex;align-items:center;gap:4px;color:var(--text-2);font-size:15px;cursor:pointer;}
    .nav-title{font-size:17px;font-weight:600;color:var(--text-1);}
    .nav-step{font-size:14px;color:var(--primary);font-weight:500;}

    /* 步骤条 */
    .step-bar{background:#fff;padding:20px 16px 16px;border-bottom:1px solid var(--border);}
    .step-list{display:flex;align-items:flex-start;justify-content:space-between;position:relative;}
    .step-list::before{content:'';position:absolute;top:14px;left:20px;right:20px;height:2px;background:#E5E6EB;z-index:0;}
    .step-item{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1;flex:1;}
    .step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:600;background:#E5E6EB;color:#86909C;transition:all var(--tr);}
    .step-item.active .step-num{background:var(--primary);color:#fff;}
    .step-item.done .step-num{background:var(--success);color:#fff;}
    .step-num svg{display:none;}
    .step-item.done .step-num span{display:none;}
    .step-item.done .step-num svg{display:block;}
    .step-name{font-size:11px;color:#86909C;white-space:nowrap;}
    .step-item.active .step-name{color:var(--primary);font-weight:500;}
    .step-item.done .step-name{color:var(--success);}

    /* 内容 */
    .page-content{max-width:520px;margin:0 auto;padding:20px 16px;}

    /* 认证卡片 */
    .auth-card{background:#fff;border-radius:var(--r-lg);padding:32px 20px;text-align:center;
      box-shadow:var(--shadow-card);}
    .auth-icon{font-size:64px;margin-bottom:20px;}
    .auth-title{font-size:20px;font-weight:600;color:var(--text-1);margin-bottom:8px;}
    .auth-desc{font-size:14px;color:var(--text-3);margin-bottom:24px;line-height:1.6;}

    /* 二维码区 */
    .qr-box{
      width:200px;height:200px;
      margin:0 auto 16px;
      background:#f8f8f8;
      border-radius:var(--r-md);
      display:flex;align-items:center;justify-content:center;
      border:1px solid var(--border);
      position:relative;
    }
    .qr-placeholder{font-size:80px;opacity:0.3;}
    .qr-expire{
      position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:4px 12px;border-radius:var(--r-full);
    }

    /* 刷新按钮 */
    .refresh-btn{
      display:inline-flex;align-items:center;gap:6px;
      color:var(--primary);font-size:14px;cursor:pointer;
      padding:8px 16px;border-radius:var(--r-full);
      background:var(--primary-bg);margin-bottom:24px;
      transition:all var(--tr);
    }
    .refresh-btn:hover{background:var(--primary-pale);}

    /* 状态 */
    .status-box{
      background:var(--primary-bg);border-radius:var(--r-md);
      padding:16px 20px;margin-bottom:20px;
      display:flex;align-items:center;gap:12px;
    }
    .status-icon{font-size:24px;}
    .status-text{font-size:14px;color:var(--text-2);text-align:left;}
    .status-text strong{color:var(--primary);display:block;margin-bottom:2px;}

    /* 底部按钮 */
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;
      background:#fff;padding:12px 20px 32px;
      display:flex;flex-direction:column;gap:10px;z-index:50;border-top:1px solid var(--border);}
    .btn-row{display:flex;gap:12px;}
    .btn-outline{height:48px;border:1px solid var(--border);border-radius:var(--r-sm);
      background:#fff;color:var(--text-1);
      font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;
      transition:all var(--tr);flex:1;}
    .btn-outline:hover{background:var(--bg);}
    .btn-primary{height:48px;border:none;border-radius:var(--r-sm);
      background:var(--primary);color:#fff;
      font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;
      transition:all var(--tr);flex:1;}
    .btn-primary:hover:not(:disabled){filter:brightness(1.05);}
    .btn-primary:active:not(:disabled){transform:scale(0.98);}
    .btn-primary:disabled{background:#C9CDD4;cursor:not-allowed;}
    .bottom-tech{font-size:12px;color:#C9CDD4;text-align:center;}

    /* Toast */
    .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-20px);
      background:rgba(29,33,41,.88);color:#fff;font-size:14px;padding:10px 20px;
      border-radius:var(--r-full);backdrop-filter:blur(8px);opacity:0;
      transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* 脉冲动画 */
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
    .pulse{animation:pulse 1.5s ease-in-out infinite;}
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- 顶部导航 -->
<div class="nav-bar">
  <div class="nav-back" onclick="goBack()">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15l-5-5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    返回
  </div>
  <div class="nav-title">商户入驻</div>
  <div class="nav-step">4/5</div>
</div>

<!-- 步骤条 -->
<div class="step-bar">
  <div class="step-list">
    <div class="step-item done">
      <div class="step-num"><span>1</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">填写信息</div>
    </div>
    <div class="step-item done">
      <div class="step-num"><span>2</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">银盛审核</div>
    </div>
    <div class="step-item done">
      <div class="step-num"><span>3</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">签约</div>
    </div>
    <div class="step-item active">
      <div class="step-num"><span>4</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">微信认证</div>
    </div>
    <div class="step-item">
      <div class="step-num"><span>5</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-name">支付宝认证</div>
    </div>
  </div>
</div>

<div class="page-content">
  <div class="auth-card">
    <div class="auth-icon" style="display:flex;align-items:center;justify-content:center;">
      <img src="assets/微信支付.svg" alt="微信支付" width="64" height="64">
    </div>
    <div class="auth-title">微信扫码认证</div>
    <div class="auth-desc">请使用微信扫描下方二维码<br/>完成商户主体认证</div>

    <div class="qr-box">
      <div class="qr-placeholder pulse">📱</div>
      <div class="qr-expire">有效期：5分钟</div>
    </div>

    <div class="refresh-btn" onclick="refreshQR()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7a6 6 0 1 0 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M1 1v4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      刷新二维码
    </div>

    <div class="status-box">
      <div class="status-icon pulse">⏳</div>
      <div class="status-text">
        <strong>等待认证中...</strong>
        请使用微信扫码完成认证
      </div>
    </div>
  </div>
</div>

<!-- 底部按钮 -->
<div class="bottom-bar">
  <div class="btn-row">
    <button class="btn-primary" onclick="markComplete()">已完成认证</button>
  </div>
  <div class="bottom-tech">由银盛提供技术支持</div>
</div>

<script>
  function showToast(msg, d = 2000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), d);
  }

  function refreshQR() {
    showToast('🔄 刷新二维码...');
  }

  function markComplete() {
    showToast('⏳ 正在验证认证结果...');
    setTimeout(() => {
      window.location.href = 'yinsheng-merchant-alipay.html';
    }, 1200);
  }
</script>
</body>
</html>
