<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>银盛钱包 · 审核失败</title>
  <style>
    /* ===== 设计令牌 ===== */
    :root {
      --color-primary:        #165DFF;
      --color-primary-light:  #4080FF;
      --color-primary-bg:     #EEF3FF;
      --color-primary-dark:   #0E3EB5;
      --color-primary-pale:   #D6E4FF;

      --color-success:        #00B42A;
      --color-success-bg:     #E8FFEA;
      --color-error:          #F53F3F;
      --color-error-bg:       #FFECE8;
      --color-warning:        #FF7D00;
      --color-warning-bg:     #FFF3E8;

      --color-text-primary:   #1D2129;
      --color-text-secondary: #4E5969;
      --color-text-placeholder: #86909C;
      --color-text-disabled:  #C9CDD4;

      --color-border:         #E5E6EB;
      --color-bg:             #F2F3F5;
      --color-card:           #FFFFFF;

      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   16px;
      --radius-xl:   24px;
      --radius-full: 9999px;

      --shadow-card: 0 4px 20px 0 rgba(0,0,0,0.08), 0 1px 4px 0 rgba(0,0,0,0.04);

      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(160deg, #FFF5F5 0%, #F2F3F5 55%, #FFFFFF 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      outline: none;
      border: none;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      width: 100vw;
      margin: 0;
      padding: 0;
    }

    /* ===== 步骤条 ===== */
    .step-bar {
      background: #fff;
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--color-border);
    }
    .step-list {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      position: relative;
    }
    .step-list::before {
      content: '';
      position: absolute;
      top: 14px;
      left: 28px;
      right: 28px;
      height: 2px;
      background: #E5E6EB;
      z-index: 0;
    }
    .step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
      flex: 1;
    }
    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      background: #E5E6EB;
      color: #86909C;
      transition: all var(--transition);
    }
    .step-item.active .step-num {
      background: var(--color-error);
      color: #fff;
    }
    .step-item.done .step-num {
      background: var(--color-primary);
      color: #fff;
    }
    .step-num svg {
      display: none;
    }
    .step-item.done .step-num span {
      display: none;
    }
    .step-item.done .step-num svg {
      display: block;
    }
    .step-name {
      font-size: 12px;
      color: #86909C;
      white-space: nowrap;
    }
    .step-item.active .step-name {
      color: var(--color-error);
      font-weight: 500;
    }
    .step-item.done .step-name {
      color: var(--color-primary);
    }

    /* ===== 主体 ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 48px;
      position: relative;
    }

    /* 背景装饰圆 */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .bg-circle-1 {
      width: 320px; height: 320px;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(245,63,63,0.06) 0%, transparent 70%);
    }
    .bg-circle-2 {
      width: 200px; height: 200px;
      bottom: 40px; right: -40px;
      background: radial-gradient(circle, rgba(245,63,63,0.04) 0%, transparent 70%);
    }

    /* ===== 内容卡片 ===== */
    .content-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--color-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(229,230,235,0.6);
      padding: 40px 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* ===== 失败图标区 ===== */
    .icon-stage {
      width: 120px;
      height: 120px;
      position: relative;
      margin-bottom: 28px;
    }

    /* 外圈脉冲 - 统一呼吸动画 */
    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(245,63,63,0.25);
      animation: pulse-out 2.4s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 0.8s; }
    .pulse-ring:nth-child(3) { animation-delay: 1.6s; }

    @keyframes pulse-out {
      0%   { transform: scale(0.85); opacity: 0.8; }
      100% { transform: scale(1.4);  opacity: 0; }
    }

    /* 主圆背景 */
    .icon-bg {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, #F53F3F, #FF6B6B);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(245,63,63,0.4);
    }

    /* 中央失败图标 */
    .fail-icon {
      width: 56px;
      height: 56px;
      color: white;
    }

    /* ===== 状态文案 ===== */
    .status-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    .status-desc {
      font-size: 14px;
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ===== 失败原因卡片 ===== */
    .reject-card {
      width: 100%;
      background: var(--color-error-bg);
      border-radius: var(--radius-md);
      border: 1px solid rgba(245,63,63,0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .reject-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: rgba(245,63,63,0.08);
      border-bottom: 1px solid rgba(245,63,63,0.08);
    }
    .reject-icon {
      width: 18px;
      height: 18px;
      color: var(--color-error);
    }
    .reject-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-error);
    }
    .reject-body {
      padding: 16px;
    }
    .reject-reason-text {
      font-size: 14px;
      color: var(--color-text-primary);
      line-height: 1.8;
      text-align: left;
    }

    /* ===== 审核信息 ===== */
    .audit-info {
      width: 100%;
      background: var(--color-bg);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .audit-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .audit-info-row:not(:last-child) {
      border-bottom: 1px dashed var(--color-border);
    }
    .audit-info-label {
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    .audit-info-value {
      font-size: 13px;
      color: var(--color-text-primary);
      font-weight: 500;
      font-family: "SF Mono", "JetBrains Mono", monospace;
    }

    /* ===== 底部提示 ===== */
    .footer-tip {
      font-size: 12px;
      color: var(--color-text-placeholder);
      text-align: center;
      line-height: 1.5;
    }

    /* ===== 操作按钮 ===== */
    .action-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: var(--radius-full);
      background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light));
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--transition);
      margin-top: 8px;
      box-shadow: 0 4px 12px rgba(22,93,255,0.3);
    }
    .action-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(22,93,255,0.4);
    }
    .action-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- 步骤条 -->
  <div class="step-bar">
    <div class="step-list">
      <div class="step-item done">
        <div class="step-num">
          <span>1</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="step-name">填写资料</div>
      </div>
      <div class="step-item active">
        <div class="step-num">2</div>
        <div class="step-name">银盛审核</div>
      </div>
      <div class="step-item">
        <div class="step-num">3</div>
        <div class="step-name">签约确认</div>
      </div>
      <div class="step-item">
        <div class="step-num">4</div>
        <div class="step-name">绑定银行卡</div>
      </div>
      <div class="step-item">
        <div class="step-num">5</div>
        <div class="step-name">设置密码</div>
      </div>
      <div class="step-item">
        <div class="step-num">6</div>
        <div class="step-name">申请成功</div>
      </div>
    </div>
  </div>

  <!-- 主体 -->
  <main class="main">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>

    <div class="content-card">
      <!-- 失败图标 -->
      <div class="icon-stage">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="icon-bg">
          <svg class="fail-icon" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="3"/>
            <path d="M16 16l16 16M32 16L16 32" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <!-- 状态文案 -->
      <div class="status-title">审核未通过</div>
      <div class="status-desc">您的入驻申请未通过审核，请查看原因后重新提交</div>

      <!-- 失败原因 -->
      <div class="reject-card">
        <div class="reject-header">
          <svg class="reject-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span class="reject-title">拒审原因</span>
        </div>
        <div class="reject-body">
          <div class="reject-reason-text">
            上传的身份证人像面照片模糊，无法识别关键信息。请确保照片清晰、四角完整、无反光遮挡。您上传的身份证有效期已过期，请使用有效期内的身份证件重新申请。填写的姓名与身份证上的姓名不一致，请核对后重新填写。
          </div>
        </div>
      </div>

      <!-- 审核信息 -->
      <div class="audit-info">
        <div class="audit-info-row">
          <span class="audit-info-label">申请编号</span>
          <span class="audit-info-value">YS202503270001</span>
        </div>
        <div class="audit-info-row">
          <span class="audit-info-label">审核时间</span>
          <span class="audit-info-value">2026-03-27 14:32:18</span>
        </div>
      </div>

      <!-- 重新提交按钮 -->
      <button class="action-btn" onclick="goToReapply()">重新提交资料</button>

      <!-- 底部提示 -->
      <div class="footer-tip" style="margin-top: 16px;">
        如有疑问，请耐心等待或稍后重试
      </div>
    </div>
  </main>

  <script>
    function goToReapply() {
      const accountType = sessionStorage.getItem('accountType') || 'personal';
      if (accountType === 'merchant') {
        window.location.href = 'yinsheng-merchant-apply.html';
      } else {
        window.location.href = 'yinsheng-onboarding-apply.html';
      }
    }
  </script>
</body>
</html>
